name: Validate Coach Notes

on:
  pull_request:
    paths:
      - "notes/**.csv"
      - "docs/positions.md"
  push:
    branches: ["main"]
    paths:
      - "notes/**.csv"
      - "docs/positions.md"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cross-validate notes against matches
        run: python scripts/validate_notes.py
